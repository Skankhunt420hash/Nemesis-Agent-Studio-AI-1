<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#667eea" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Agent Chat</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <div class="topbar">
        <div class="brand"><h1 id="title">Agent</h1><p id="subtitle">Lade…</p></div>
        <div class="actions"><a class="btn secondary" href="/">Dashboard</a></div>
      </div>
      <div class="content grid" style="grid-template-columns: 1fr 360px;">
        <div class="card">
          <div id="messages" class="list" style="min-height:420px;"></div>
          <form id="chatForm" class="actions" style="margin-top:14px;">
            <input id="chatInput" style="flex:1;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;font:inherit;" placeholder="Schreib eine Nachricht…" />
            <button class="btn" type="submit">Senden</button>
          </form>
        </div>
        <div class="card">
          <h3>Agent Info</h3>
          <div id="info" class="list"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="/agent.js" defer></script>
</body>
</html>
